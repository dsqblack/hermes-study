<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股市情报站</title>
<style>
:root {
  --bg: #f3f5f8;
  --card: #ffffff;
  --hover: #f0f2f5;
  --border: #d6d9e0;
  --border-light: #e3e6ec;
  --text: #2c3e50;
  --text-sec: #6b7a8f;
  --text-muted: #9aa7b8;
  --blue: #1176b6;
  --blue-bg: rgba(17,118,182,0.08);
  --green: #27ae60;
  --green-bg: rgba(39,174,96,0.08);
  --red: #e74c3c;
  --red-bg: rgba(231,76,60,0.08);
  --radius: 3px;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  --mono: "SF Mono", "Fira Code", "Consolas", monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: var(--font); background: var(--bg); color: var(--text);
  min-height: 100vh; -webkit-font-smoothing: antialiased;
}
.app { display: flex; flex-direction: column; min-height: 100vh; }
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px; background: var(--card);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  position: sticky; top: 0; z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.header-left .logo {
  width: 20px; height: 20px; border-radius: 3px;
  background: linear-gradient(135deg, var(--blue), #27ae60);
  flex-shrink: 0;
}
.header-left h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
.header-left .subtitle { font-size: 11px; color: var(--text-muted); margin-left: 6px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.time-badge { font-size: 12px; color: var(--text-muted); font-family: var(--mono); }
.main { flex: 1; padding: 24px; max-width: 1100px; margin: 0 auto; width: 100%; }

.collect-section { margin-bottom: 24px; }
.collect-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 48px 32px;
  text-align: center;
}
.collect-card .icon { font-size: 48px; margin-bottom: 16px; display: block; }
.collect-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.collect-card p { font-size: 13px; color: var(--text-sec); margin-bottom: 24px; }

.btn-collect {
  height: 48px; padding: 0 40px; border: none;
  border-radius: var(--radius); font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all .2s;
  background: var(--blue); color: #fff;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn-collect:hover { background: #0f64a0; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(17,118,182,0.25); }
.btn-collect:active { transform: translateY(0); }
.btn-collect:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-collect .spinner {
  display: none; width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .6s linear infinite;
}
.btn-collect.loading .spinner { display: inline-block; }
.btn-collect.loading .btntext { opacity: 0.7; }
@keyframes spin { to { transform: rotate(360deg); } }
.last-update { font-size: 11px; color: var(--text-muted); margin-top: 12px; }

.data-section { display: none; }
.data-section.visible { display: block; }

.indices {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 8px; margin-bottom: 20px;
}
.index-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px;
  border-left: 3px solid var(--border);
}
.index-card .idx-name { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.index-card .idx-price { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; }
.index-card .idx-change { font-size: 13px; font-weight: 600; margin-top: 2px; font-variant-numeric: tabular-nums; }
.index-card.up { border-left-color: var(--green); }
.index-card.down { border-left-color: var(--red); }
.index-card .idx-price.up { color: var(--green); }
.index-card .idx-price.down { color: var(--red); }
.index-card .idx-change.up { color: var(--green); }
.index-card .idx-change.down { color: var(--red); }

.section-title {
  font-size: 12px; font-weight: 600; color: var(--text-sec);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 10px; margin-top: 20px;
  display: flex; align-items: center; gap: 6px;
}
.section-title:first-child { margin-top: 0; }
.section-title .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); flex-shrink: 0; }

.table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
table { width: 100%; border-collapse: collapse; }
thead th {
  text-align: left; padding: 10px 14px;
  font-size: 11px; font-weight: 600; color: var(--text-sec);
  text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 2px solid var(--border); background: var(--bg);
}
thead th:last-child, tbody td:last-child { text-align: right; }
thead th:nth-child(3), tbody td:nth-child(3) { text-align: right; }
tbody tr { border-bottom: 1px solid var(--border-light); transition: background .1s; }
tbody tr:hover { background: var(--hover); }
tbody td { padding: 10px 14px; vertical-align: middle; font-size: 13px; }
td.name-col { font-weight: 600; }
td.code-col { font-family: var(--mono); font-size: 12px; color: var(--text-muted); }
td.num-col { font-family: var(--mono); font-size: 14px; font-weight: 700; text-align: right; font-variant-numeric: tabular-nums; }
td.num-col.up { color: var(--green); }
td.num-col.down { color: var(--red); }
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 2px; font-size: 12px; font-weight: 600; }
.badge.up { background: var(--green-bg); color: var(--green); }
.badge.down { background: var(--red-bg); color: var(--red); }

.news-list { display: flex; flex-direction: column; }
.news-item {
  padding: 12px 16px; background: var(--card);
  border-bottom: 1px solid var(--border-light);
  cursor: pointer; transition: background .15s;
}
.news-item:first-child { border-top-left-radius: var(--radius); border-top-right-radius: var(--radius); }
.news-item:last-child { border-bottom-left-radius: var(--radius); border-bottom-right-radius: var(--radius); border-bottom: 1px solid var(--border); }
.news-item:hover { background: var(--hover); }
.news-item .news-title { font-size: 13px; font-weight: 500; line-height: 1.5; color: var(--text); }
.news-item .news-meta { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
.news-item .news-meta .nsource { font-size: 11px; color: var(--blue); }
.news-item .news-meta .ntime { font-size: 11px; color: var(--text-muted); }

.flow-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 8px; margin-bottom: 20px; }
.flow-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.flow-card .fl-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.flow-card .fl-value { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
.flow-card .fl-value.inflow { color: var(--green); }
.flow-card .fl-value.outflow { color: var(--red); }

.error-state { display: none; text-align: center; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 48px 32px; }
.error-state.visible { display: block; }
.error-state .err-icon { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--red); display: inline-flex; align-items: center; justify-content: center; font-size: 22px; color: var(--red); margin-bottom: 12px; }
.error-state .err-text { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.error-state .err-detail { font-size: 12px; color: var(--text-sec); margin-bottom: 16px; }
.error-state .btn-retry { height: 36px; padding: 0 24px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--card); color: var(--text); font-size: 13px; cursor: pointer; transition: all .15s; }
.error-state .btn-retry:hover { border-color: var(--blue); color: var(--blue); }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

@media (max-width: 700px) {
  .main { padding: 16px; }
  .collect-card { padding: 32px 20px; }
  .indices { grid-template-columns: repeat(2, 1fr); }
  .flow-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-left">
      <div class="logo"></div>
      <h1>股市情报站</h1>
      <span class="subtitle">· 实时行情采集</span>
    </div>
    <div class="header-right">
      <span class="time-badge" id="timeBadge"></span>
    </div>
  </header>

  <div class="main">
    <div class="collect-section">
      <div class="collect-card">
        <span class="icon">📊</span>
        <h2>实时股市情报</h2>
        <p>一键采集 A 股大盘指数、热门板块、资金流向、财经要闻</p>
        <button class="btn-collect" id="collectBtn">
          <span class="spinner"></span>
          <span class="btntext">&#x25B6; 开始收集</span>
        </button>
        <div class="last-update" id="lastUpdate"></div>
      </div>
    </div>

    <div class="error-state" id="errorState">
      <div class="err-icon">!</div>
      <div class="err-text">数据采集失败</div>
      <div class="err-detail" id="errDetail">无法连接到行情服务</div>
      <button class="btn-retry" id="retryBtn">&#x21BB; 重试</button>
    </div>

    <div class="data-section" id="dataSection">
      <div class="section-title"><span class="dot"></span>大盘指数</div>
      <div class="indices" id="indexContainer"></div>

      <div class="section-title"><span class="dot"></span>资金流向</div>
      <div class="flow-grid" id="flowContainer"></div>

      <div class="section-title"><span class="dot"></span>热门板块</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>板块</th><th>代码</th><th>最新价</th><th>涨跌幅</th></tr></thead>
          <tbody id="sectorBody"></tbody>
        </table>
      </div>

      <div class="section-title"><span class="dot"></span>热门个股</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>名称</th><th>代码</th><th>最新价</th><th>涨跌幅</th></tr></thead>
          <tbody id="stockBody"></tbody>
        </table>
      </div>

      <div class="section-title"><span class="dot"></span>财经要闻</div>
      <div class="news-list" id="newsContainer"></div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';
  var DOM = {
    collectBtn: document.getElementById('collectBtn'),
    lastUpdate: document.getElementById('lastUpdate'),
    dataSection: document.getElementById('dataSection'),
    errorState: document.getElementById('errorState'),
    errDetail: document.getElementById('errDetail'),
    retryBtn: document.getElementById('retryBtn'),
    indexContainer: document.getElementById('indexContainer'),
    flowContainer: document.getElementById('flowContainer'),
    sectorBody: document.getElementById('sectorBody'),
    stockBody: document.getElementById('stockBody'),
    newsContainer: document.getElementById('newsContainer'),
    timeBadge: document.getElementById('timeBadge'),
  };

  function updateTime() {
    var now = new Date();
    DOM.timeBadge.textContent = now.getFullYear() + '-' +
      pad(now.getMonth()+1) + '-' + pad(now.getDate()) + ' ' +
      pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
  }
  function pad(n) { return String(n).padStart(2, '0'); }
  updateTime();
  setInterval(updateTime, 1000);

  async function collectData() {
    DOM.collectBtn.disabled = true;
    DOM.collectBtn.classList.add('loading');
    DOM.collectBtn.querySelector('.btntext').textContent = '正在采集...';
    DOM.errorState.classList.remove('visible');
    DOM.dataSection.classList.remove('visible');

    try {
      var resp = await fetch('/api/stock/hot');
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      var data = await resp.json();
      if (data.code !== 0) throw new Error(data.msg || '接口异常');
      renderData(data);
      DOM.lastUpdate.textContent = '上次更新：' + new Date().toLocaleString('zh-CN');
    } catch(e) {
      console.error('[Stock]', e);
      DOM.errDetail.textContent = e.message || '网络异常，请稍后重试';
      DOM.errorState.classList.add('visible');
    } finally {
      DOM.collectBtn.disabled = false;
      DOM.collectBtn.classList.remove('loading');
      DOM.collectBtn.querySelector('.btntext').textContent = '\u25B6 开始收集';
    }
  }

  function renderData(d) {
    // Indices
    var idxHtml = '';
    (d.indices || []).forEach(function(idx) {
      var up = idx.changePct >= 0;
      idxHtml += '<div class="index-card ' + (up ? 'up' : 'down') + '">' +
        '<div class="idx-name">' + esc(idx.name) + '</div>' +
        '<div class="idx-price ' + (up ? 'up' : 'down') + '">' + fmtPrice(idx.price) + '</div>' +
        '<div class="idx-change ' + (up ? 'up' : 'down') + '">' +
          (up ? '+' : '') + idx.changePct.toFixed(2) + '%' +
          ' <span style="font-weight:400;font-size:12px">' +
          (up ? '+' : '') + fmtPrice(idx.change) + '</span>' +
        '</div></div>';
    });
    DOM.indexContainer.innerHTML = idxHtml;

    // Fund Flow
    var flowHtml = '';
    var flows = d.fundFlow || {};
    var flowItems = [
      { label: '主力净流入', value: fmtMoney(flows.mainForce), cls: (flows.mainForce || 0) >= 0 ? 'inflow' : 'outflow' },
      { label: '主力净流入占比', value: flows.mainForcePct != null ? flows.mainForcePct.toFixed(2) + '%' : '-', cls: (flows.mainForcePct || 0) >= 0 ? 'inflow' : 'outflow' },
      { label: '散户净流入', value: fmtMoney(flows.retail), cls: (flows.retail || 0) >= 0 ? 'inflow' : 'outflow' },
      { label: '散户净流入占比', value: flows.retailPct != null ? flows.retailPct.toFixed(2) + '%' : '-', cls: (flows.retailPct || 0) >= 0 ? 'inflow' : 'outflow' },
    ];
    flowItems.forEach(function(f) {
      flowHtml += '<div class="flow-card"><div class="fl-label">' + f.label + '</div>' +
        '<div class="fl-value ' + f.cls + '">' + f.value + '</div></div>';
    });
    DOM.flowContainer.innerHTML = flowHtml;

    // Sectors
    DOM.sectorBody.innerHTML = '';
    (d.sectors || []).forEach(function(s) {
      var up = s.changePct >= 0;
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="name-col">' + esc(s.name) + '</td>' +
        '<td class="code-col">' + esc(s.code) + '</td>' +
        '<td class="num-col ' + (up ? 'up' : 'down') + '">' + fmtPrice(s.price) + '</td>' +
        '<td class="num-col"><span class="badge ' + (up ? 'up' : 'down') + '">' +
          (up ? '+' : '') + s.changePct.toFixed(2) + '%</span></td>';
      DOM.sectorBody.appendChild(tr);
    });

    // Stocks
    DOM.stockBody.innerHTML = '';
    (d.stocks || []).forEach(function(st) {
      var up = st.changePct >= 0;
      var tr2 = document.createElement('tr');
      tr2.innerHTML =
        '<td class="name-col">' + esc(st.name) + '</td>' +
        '<td class="code-col">' + esc(st.code) + '</td>' +
        '<td class="num-col ' + (up ? 'up' : 'down') + '">' + fmtPrice(st.price) + '</td>' +
        '<td class="num-col"><span class="badge ' + (up ? 'up' : 'down') + '">' +
          (up ? '+' : '') + st.changePct.toFixed(2) + '%</span></td>';
      DOM.stockBody.appendChild(tr2);
    });

    // News
    DOM.newsContainer.innerHTML = '';
    (d.news || []).forEach(function(n) {
      if (!n.title) return;
      var div = document.createElement('div');
      div.className = 'news-item';
      div.innerHTML =
        '<div class="news-title">' + esc(n.title) + '</div>' +
        '<div class="news-meta"><span class="nsource">' + esc(n.source) + '</span>' +
        '<span class="ntime">' + esc(n.time) + '</span></div>';
      if (n.url) div.style.cursor = 'pointer';
      div.addEventListener('click', function() { if (n.url) window.open(n.url, '_blank'); });
      DOM.newsContainer.appendChild(div);
    });

    DOM.dataSection.classList.add('visible');
  }

  function esc(s) { if (s == null) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function fmtPrice(v) { if (v == null) return '-'; return v.toFixed(2); }
  function fmtMoney(v) {
    if (v == null) return '-';
    var abs = Math.abs(v);
    var prefix = v < 0 ? '-' : '';
    if (abs >= 100000000) return prefix + (abs / 100000000).toFixed(2) + '亿';
    if (abs >= 10000) return prefix + (abs / 10000).toFixed(2) + '万';
    return prefix + abs.toFixed(0);
  }

  DOM.collectBtn.addEventListener('click', collectData);
  DOM.retryBtn.addEventListener('click', collectData);
  collectData();
})();
</script>
</body>
</html>
