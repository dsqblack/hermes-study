<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股市情报站</title>
<style>
/* === Design Token === */
:root {
  --bg:           #f5f6f8;
  --bg-card:      #ffffff;
  --bg-hover:     #f0f2f5;
  --border:       #e2e5ec;
  --text:         #1e293b;
  --text-sec:     #64748b;
  --text-muted:   #94a3b8;
  --blue:         #2563eb;
  --blue-light:   rgba(37,99,235,0.08);
  --blue-hover:   #1d4ed8;
  --rise:         #e05c3a;
  --rise-bg:      rgba(224,92,58,0.08);
  --fall:         #16a34a;
  --fall-bg:      rgba(22,163,74,0.08);
  --amber:        #d97706;
  --amber-bg:     rgba(217,119,6,0.08);
  --danger:       #dc2626;
  --success:      #059669;
  --radius-sm:    4px;
  --radius-md:    8px;
  --radius-lg:    12px;
  --radius-xl:    16px;
  --shadow-card:  0 1px 4px rgba(0,0,0,0.06);
  --shadow-hover: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-modal: 0 12px 40px rgba(0,0,0,0.14);
  --ease:         150ms ease;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  --mono: "SF Mono", "Fira Code", "Consolas", monospace;
}
[data-theme="dark"] {
  --bg:           #0f1117;
  --bg-card:      #1a1d27;
  --bg-hover:     #232635;
  --border:       #2e3347;
  --text:         #e2e8f0;
  --text-sec:     #94a3b8;
  --text-muted:   #4a5568;
  --blue:         #60a5fa;
  --blue-light:   rgba(96,165,250,0.10);
  --shadow-card:  0 1px 4px rgba(0,0,0,0.15);
  --shadow-hover: 0 4px 16px rgba(0,0,0,0.25);
  --shadow-modal: 0 12px 40px rgba(0,0,0,0.35);
  --rise:         #f87171;
  --rise-bg:      rgba(248,113,113,0.10);
  --fall:         #4ade80;
  --fall-bg:      rgba(74,222,128,0.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: var(--font); background: var(--bg); color: var(--text);
  min-height: 100vh; -webkit-font-smoothing: antialiased;
}
.app { display: flex; flex-direction: column; min-height: 100vh; }

/* === Header === */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 52px; background: var(--bg-card);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  position: sticky; top: 0; z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 8px; }
.back-btn {
  width: 32px; height: 32px; border-radius: var(--radius-md);
  border: 1px solid var(--border); background: transparent;
  color: var(--text-sec); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  text-decoration: none; transition: all var(--ease);
}
.back-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
.header-left h1 { font-size: 15px; font-weight: 600; }
.header-left .subtitle { font-size: 11px; color: var(--text-muted); margin-left: 4px; }
.header-right { display: flex; align-items: center; gap: 8px; }
.header-time { font-size: 12px; color: var(--text-muted); font-family: var(--mono); }
.theme-toggle, .btn-refresh {
  width: 32px; height: 32px; border-radius: var(--radius-md);
  border: 1px solid var(--border); background: transparent;
  color: var(--text-sec); cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--ease);
}
.theme-toggle:hover, .btn-refresh:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
.btn-refresh.spinning .refresh-icon { animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* === Main === */
.main { flex: 1; padding: 20px 24px 40px; max-width: 1200px; margin: 0 auto; width: 100%; }

/* === Loading === */
.loading-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 80px 20px; gap: 12px; color: var(--text-muted);
}
.loading-state .spinner {
  width: 28px; height: 28px; border: 3px solid var(--border);
  border-top-color: var(--blue); border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
.loading-state .lt { font-size: 14px; }

/* === Index Grid (4 columns) === */
.indices { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
.index-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px 18px;
  border-left: 3px solid var(--border);
}
.index-card.up { border-left-color: var(--rise); }
.index-card.down { border-left-color: var(--fall); }
.idx-name { font-size: 11px; color: var(--text-muted); letter-spacing: 0.3px; margin-bottom: 4px; }
.idx-price { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
.idx-price.up { color: var(--rise); }
.idx-price.down { color: var(--fall); }
.idx-change { font-size: 13px; font-weight: 600; margin-top: 2px; font-variant-numeric: tabular-nums; }
.idx-change.up { color: var(--rise); }
.idx-change.down { color: var(--fall); }

/* === Double Column === */
.double-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }

/* === Section Title === */
.section-title {
  font-size: 12px; font-weight: 600; color: var(--text-sec);
  letter-spacing: 0.3px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.section-title .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); flex-shrink: 0; }

/* === Table === */
.table-wrap {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead th {
  text-align: left; padding: 10px 14px;
  font-size: 11px; font-weight: 600; color: var(--text-sec);
  letter-spacing: 0.3px; border-bottom: 2px solid var(--border); background: var(--bg-hover);
}
thead th:last-child, tbody td:last-child { text-align: right; }
thead th:nth-child(3), tbody td:nth-child(3) { text-align: right; }
tbody tr { border-bottom: 1px solid var(--border); transition: background var(--ease); }
tbody tr:hover { background: var(--bg-hover); }
tbody td { padding: 9px 14px; vertical-align: middle; font-size: 13px; }
td.name-col { font-weight: 600; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
td.code-col { font-family: var(--mono); font-size: 12px; color: var(--text-muted); }
td.num-col { font-family: var(--mono); font-size: 14px; font-weight: 700; text-align: right; font-variant-numeric: tabular-nums; }
td.num-col.up { color: var(--rise); }
td.num-col.down { color: var(--fall); }
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 10px; border-radius: var(--radius-md); font-size: 12px; font-weight: 600;
}
.badge.up { background: var(--rise-bg); color: var(--rise); }
.badge.down { background: var(--fall-bg); color: var(--fall); }

/* === News === */
.news-section { margin-bottom: 20px; }
.news-list { display: flex; flex-direction: column; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.news-item {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background var(--ease);
}
.news-item:last-child { border-bottom: none; }
.news-item:hover { background: var(--bg-hover); }
.news-item .news-title { font-size: 13px; font-weight: 500; line-height: 1.5; color: var(--text); }
.news-item .news-meta { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
.news-item .nsource { font-size: 11px; color: var(--blue); }
.news-item .ntime { font-size: 11px; color: var(--text-muted); }

/* === Toast === */
.toast-container {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  z-index: 999; display: flex; flex-direction: column; gap: 8px; pointer-events: none;
}
.toast {
  padding: 10px 20px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500;
  color: #fff; box-shadow: var(--shadow-modal); pointer-events: auto; white-space: nowrap;
  animation: toastIn 0.25s ease-out;
}
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
@keyframes toastIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* === Responsive === */
@media (max-width: 800px) {
  .indices { grid-template-columns: repeat(2, 1fr); }
  .double-col { grid-template-columns: 1fr; }
  .main { padding: 16px; }
}
@media (max-width: 480px) {
  .indices { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .index-card { padding: 12px 14px; }
  .idx-price { font-size: 18px; }
  .header { padding: 0 12px; }
  .header-left .subtitle { display: none; }
}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <a href="/" class="back-btn" title="返回首页" aria-label="返回首页">&larr;</a>
      <h1>股市情报站</h1>
      <span class="subtitle">· 实时行情</span>
    </div>
    <div class="header-right">
      <span class="header-time" id="headerTime"></span>
      <button class="btn-refresh" id="refreshBtn" title="刷新数据" aria-label="刷新数据"><span class="refresh-icon">&#x21BB;</span></button>
      <button class="theme-toggle" id="themeToggle" title="切换暗色模式" aria-label="切换暗色模式">&#9790;</button>
    </div>
  </header>

  <div class="main">
    <!-- Loading -->
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <span class="lt">正在采集行情数据...</span>
    </div>

    <!-- Data Section -->
    <div id="dataSection" style="display:none">
      <div class="section-title"><span class="dot"></span>大盘指数</div>
      <div class="indices" id="indexContainer"></div>

      <div class="double-col">
        <div>
          <div class="section-title"><span class="dot"></span>热门板块</div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>板块</th><th>代码</th><th>最新价</th><th>涨跌幅</th></tr></thead>
              <tbody id="sectorBody"></tbody>
            </table>
          </div>
        </div>
        <div>
          <div class="section-title"><span class="dot"></span>热门个股</div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>名称</th><th>代码</th><th>最新价</th><th>涨跌幅</th></tr></thead>
              <tbody id="stockBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="news-section">
        <div class="section-title"><span class="dot"></span>财经要闻</div>
        <div class="news-list" id="newsContainer"></div>
      </div>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
(function() {
  'use strict';

  // === Dark Mode ===
  var theme = localStorage.getItem('hermes-theme') || 'light';
  if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  document.getElementById('themeToggle').addEventListener('click', function() {
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isDark) {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('hermes-theme', 'light');
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
      localStorage.setItem('hermes-theme', 'dark');
    }
  });

  // === Clock ===
  function updateClock() {
    var now = new Date();
    document.getElementById('headerTime').textContent =
      String(now.getHours()).padStart(2,'0') + ':' +
      String(now.getMinutes()).padStart(2,'0') + ':' +
      String(now.getSeconds()).padStart(2,'0');
  }
  updateClock();
  setInterval(updateClock, 1000);

  // === Toast ===
  function showToast(msg, type) {
    type = type || 'success';
    var container = document.getElementById('toastContainer');
    var el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    container.appendChild(el);
    setTimeout(function() {
      el.style.opacity = '0';
      el.style.transition = 'opacity 0.3s';
      setTimeout(function() { el.remove(); }, 300);
    }, 3000);
  }

  // === Data Fetch ===
  var DOM = {
    loadingState: document.getElementById('loadingState'),
    dataSection: document.getElementById('dataSection'),
    indexContainer: document.getElementById('indexContainer'),
    sectorBody: document.getElementById('sectorBody'),
    stockBody: document.getElementById('stockBody'),
    newsContainer: document.getElementById('newsContainer'),
    refreshBtn: document.getElementById('refreshBtn'),
  };
  var isCollecting = false;

  function collectData() {
    if (isCollecting) return;
    isCollecting = true;
    DOM.refreshBtn.classList.add('spinning');

    fetch('/api/stock/hot').then(function(r) { return r.json(); }).then(function(data) {
      if (data.code !== 0) throw new Error(data.msg || '接口异常');
      renderData(data);
      DOM.loadingState.style.display = 'none';
      DOM.dataSection.style.display = 'block';
      showToast('数据已更新', 'success');
    }).catch(function(e) {
      console.error('[Stock]', e);
      if (DOM.dataSection.style.display === 'none') {
        DOM.loadingState.innerHTML = '<div style="font-size:36px;margin-bottom:8px">&#x26A0;</div><span class="lt">数据加载失败</span><span style="font-size:12px;color:var(--text-muted)">' + (e.message || '网络异常') + '</span><button onclick="location.reload()" style="margin-top:16px;height:36px;padding:0 24px;border-radius:var(--radius-md);border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-size:13px;cursor:pointer">&#x21BB; 重试</button>';
      } else {
        showToast('刷新失败: ' + (e.message || '网络异常'), 'error');
      }
    }).finally(function() {
      isCollecting = false;
      DOM.refreshBtn.classList.remove('spinning');
    });
  }

  function renderData(d) {
    // Indices
    var idxHtml = '';
    (d.indices || []).forEach(function(idx) {
      var up = idx.changePct >= 0;
      idxHtml += '<div class="index-card ' + (up ? 'up' : 'down') + '">' +
        '<div class="idx-name">' + esc(idx.name) + '</div>' +
        '<div class="idx-price ' + (up ? 'up' : 'down') + '">' + fmtPrice(idx.price) + '</div>' +
        '<div class="idx-change ' + (up ? 'up' : 'down') + '">' +
          (up ? '+' : '') + idx.changePct.toFixed(2) + '%' +
          ' <span style="font-weight:400;font-size:12px">' +
          (up ? '+' : '') + fmtPrice(idx.change) + '</span>' +
        '</div></div>';
    });
    DOM.indexContainer.innerHTML = idxHtml || '<div style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:20px">暂无指数数据</div>';

    // Sectors
    DOM.sectorBody.innerHTML = '';
    (d.sectors || []).forEach(function(s) {
      var up = s.changePct >= 0;
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="name-col">' + esc(s.name) + '</td>' +
        '<td class="code-col">' + esc(s.code) + '</td>' +
        '<td class="num-col ' + (up ? 'up' : 'down') + '">' + fmtPrice(s.price) + '</td>' +
        '<td class="num-col"><span class="badge ' + (up ? 'up' : 'down') + '">' +
          (up ? '+' : '') + s.changePct.toFixed(2) + '%</span></td>';
      DOM.sectorBody.appendChild(tr);
    });

    // Stocks
    DOM.stockBody.innerHTML = '';
    (d.stocks || []).forEach(function(st) {
      var up = st.changePct >= 0;
      var tr2 = document.createElement('tr');
      tr2.innerHTML =
        '<td class="name-col">' + esc(st.name) + '</td>' +
        '<td class="code-col">' + esc(st.code) + '</td>' +
        '<td class="num-col ' + (up ? 'up' : 'down') + '">' + fmtPrice(st.price) + '</td>' +
        '<td class="num-col"><span class="badge ' + (up ? 'up' : 'down') + '">' +
          (up ? '+' : '') + st.changePct.toFixed(2) + '%</span></td>';
      DOM.stockBody.appendChild(tr2);
    });

    // News
    DOM.newsContainer.innerHTML = '';
    (d.news || []).forEach(function(n) {
      if (!n.title) return;
      var div = document.createElement('div');
      div.className = 'news-item';
      div.innerHTML =
        '<div class="news-title">' + esc(n.title) + '</div>' +
        '<div class="news-meta"><span class="nsource">' + esc(n.source || '') + '</span>' +
        '<span class="ntime">' + esc(n.time || '') + '</span></div>';
      if (n.url) div.style.cursor = 'pointer';
      div.addEventListener('click', function() { if (n.url) window.open(n.url, '_blank'); });
      DOM.newsContainer.appendChild(div);
    });
  }

  function esc(s) { if (s == null) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function fmtPrice(v) { if (v == null) return '-'; return v.toFixed(2); }

  DOM.refreshBtn.addEventListener('click', collectData);
  collectData();
})();
</script>
</body>
</html>
